<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS3 Dungeon Scene Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      color: #ddd;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- LEFT: asset palette --- */
    #palette {
      width: 200px;
      min-width: 200px;
      background: #111118;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding: 6px;
      display: flex;
      flex-direction: column;
    }
    #palette h2 { font-size: 12px; color: #ffd700; margin: 0 0 4px; }
    .mode-tabs {
      display: flex; gap: 4px; margin-bottom: 6px;
    }
    .mode-tab {
      flex: 1; padding: 4px; text-align: center;
      font-size: 9px; background: #1a1a28; border: 1px solid #333;
      border-radius: 3px; cursor: pointer; color: #aaa;
    }
    .mode-tab.active { background: #335; border-color: #88f; color: #fff; }
    .pal-section { margin-bottom: 8px; }
    .pal-section h3 {
      font-size: 9px; color: #88aaff; margin-bottom: 3px;
      border-bottom: 1px solid #222; padding-bottom: 2px; cursor: pointer;
    }
    .pal-section h3:hover { color: #aaccff; }
    .pal-grid { display: flex; flex-wrap: wrap; gap: 3px; }
    .pal-grid.collapsed { display: none; }
    .pal-item {
      background: #1a1a28; border: 1px solid #333; border-radius: 3px;
      padding: 2px; cursor: pointer; text-align: center;
    }
    .pal-item:hover { border-color: #ffd700; }
    .pal-item.selected { border-color: #4f4; border-width: 2px; background: #1a2a1a; }
    .pal-item img {
      image-rendering: pixelated; display: block;
      max-width: 42px; max-height: 42px; margin: 0 auto;
    }
    .pal-item .name {
      font-size: 6px; color: #666; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; max-width: 46px;
    }

    /* --- CENTER: canvas --- */
    #scene-area { flex: 1; display: flex; flex-direction: column; }
    #toolbar {
      display: flex; align-items: center; gap: 6px; padding: 4px 10px;
      background: #151520; border-bottom: 1px solid #333; flex-wrap: wrap;
    }
    #toolbar button, #toolbar .tb {
      background: #252535; color: #ddd; border: 1px solid #444;
      padding: 3px 8px; font-family: 'Courier New', monospace;
      font-size: 9px; border-radius: 3px; cursor: pointer;
    }
    #toolbar button:hover { background: #353548; }
    #toolbar button.active { background: #445; border-color: #88f; color: #fff; }
    #toolbar label { font-size: 9px; color: #aaa; }
    #toolbar select, #toolbar input {
      background: #222; color: #ddd; border: 1px solid #444;
      padding: 2px 4px; font-family: 'Courier New', monospace;
      font-size: 9px; border-radius: 3px;
    }
    #toolbar input[type="number"] { width: 40px; }
    .sep { width: 1px; height: 18px; background: #333; }
    #status { font-size: 8px; color: #666; margin-left: auto; }

    #canvas-wrap {
      flex: 1; position: relative; overflow: hidden; background: #060610;
    }
    #sceneCanvas {
      position: absolute; image-rendering: pixelated;
    }

    /* --- RIGHT: properties + layers --- */
    #props {
      width: 190px; min-width: 190px; background: #111118;
      border-left: 1px solid #333; padding: 6px; overflow-y: auto;
    }
    #props h2 { font-size: 12px; color: #ffd700; margin-bottom: 6px; }
    .prop-row {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
    }
    .prop-row label { font-size: 9px; color: #aaa; }
    .prop-row input, .prop-row select {
      background: #222; color: #ddd; border: 1px solid #444;
      padding: 1px 3px; font-family: 'Courier New', monospace;
      font-size: 9px; border-radius: 3px;
    }
    .prop-row input[type="number"] { width: 55px; }
    .prop-row input[type="range"] { width: 80px; }
    .prop-row button {
      background: #252535; color: #ddd; border: 1px solid #444;
      padding: 2px 6px; font-size: 8px; cursor: pointer; border-radius: 3px;
    }
    #prop-none { font-size: 9px; color: #555; }
    #layer-list h3 { font-size: 10px; color: #8f8; margin: 8px 0 4px; }
    .layer-item {
      font-size: 8px; padding: 2px 4px; background: #1a1a28;
      border: 1px solid #333; margin-bottom: 1px; border-radius: 2px;
      cursor: pointer; display: flex; justify-content: space-between;
    }
    .layer-item.selected { border-color: #ffd700; background: #252530; }
    .layer-item .del-btn { color: #f44; cursor: pointer; padding: 0 3px; }
    #export-area { margin-top: 8px; border-top: 1px solid #333; padding-top: 6px; }
    #export-area textarea {
      width: 100%; height: 60px; background: #1a1a28; color: #8f8;
      border: 1px solid #333; font-size: 7px; padding: 3px; border-radius: 3px; resize: vertical;
    }
  </style>
</head>
<body>

<div id="palette">
  <h2>Assets</h2>
  <!-- Paint mode vs Object mode -->
  <div class="mode-tabs">
    <div class="mode-tab active" id="mode-paint">PAINT</div>
    <div class="mode-tab" id="mode-object">OBJECT</div>
    <div class="mode-tab" id="mode-erase">ERASE</div>
  </div>
  <div id="pal-sections"></div>
</div>

<div id="scene-area">
  <div id="toolbar">
    <label>Grid:
      <input type="number" id="tb-gridsize" value="64" min="16" max="128" step="16">
    </label>
    <button id="tb-grid" class="active">Grid</button>
    <button id="tb-snap" class="active">Snap</button>
    <div class="sep"></div>
    <label>BG: <input type="color" id="tb-bgcolor" value="#0d1f0d"></label>
    <div class="sep"></div>
    <button id="tb-fill-row">Fill Row</button>
    <button id="tb-fill-area">Fill Area</button>
    <div class="sep"></div>
    <button id="tb-undo">Undo</button>
    <button id="tb-export">Export</button>
    <button id="tb-import">Import</button>
    <button id="tb-clear">Clear</button>
    <span id="status">Pan: middle-click drag | Zoom: scroll | Paint: left-click drag</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="sceneCanvas"></canvas>
  </div>
</div>

<div id="props">
  <h2>Properties</h2>
  <div id="prop-panel">
    <div id="prop-none">Select an object or paint tiles</div>
    <div id="prop-fields" style="display:none;">
      <div class="prop-row"><label>X:</label><input type="number" id="prop-x" step="1"></div>
      <div class="prop-row"><label>Y:</label><input type="number" id="prop-y" step="1"></div>
      <div class="prop-row"><label>Scale:</label><input type="range" id="prop-scale" min="0.2" max="6" step="0.1" value="1"><span id="prop-scale-val" style="font-size:8px;color:#ffd700;">1.0</span></div>
      <div class="prop-row"><label>Alpha:</label><input type="range" id="prop-alpha" min="0.1" max="1" step="0.05" value="1"><span id="prop-alpha-val" style="font-size:8px;color:#ffd700;">1.0</span></div>
      <div class="prop-row"><label>Flip:</label><input type="checkbox" id="prop-flipx"></div>
      <div class="prop-row"><label>Layer:</label>
        <select id="prop-layer"><option value="0">Back</option><option value="1">Mid</option><option value="2">Front</option></select>
      </div>
      <div class="prop-row"><button id="prop-dup">Duplicate</button><button id="prop-del" style="color:#f44;">Delete</button></div>
    </div>
  </div>
  <div id="layer-list">
    <h3>Objects (<span id="obj-count">0</span>)</h3>
    <div id="obj-list" style="max-height:300px;overflow-y:auto;"></div>
  </div>
  <div id="export-area">
    <textarea id="export-json" readonly placeholder="Export JSON..."></textarea>
  </div>
</div>

// =====================================================
//  STATE
// =====================================================
var images = {};
var srcMap = {};
var mode = "paint";       // "paint" | "object" | "erase"
var selectedAsset = null; // currently selected palette asset { key, src, tile }
var sceneObjs = [];       // free-placed objects (object mode)
var tileMap = {};         // painted tiles: "col,row" → { key, src }
var nextId = 1;
var selectedId = null;    // selected scene object ID
var dragging = null;      // dragging object
var painting = false;     // currently painting tiles
var showGrid = true;
var snapOn = true;
var gridSize = 64;
var bgColor = "#0d1f0d";
var undoStack = [];

// Camera: pan/zoom on an infinite canvas
var cam = { x: 0, y: 0, zoom: 1 };
var panning = false;
var panStart = { x: 0, y: 0, cx: 0, cy: 0 };

var canvas, ctx, wrap;

// =====================================================
//  INIT
// =====================================================
window.addEventListener("DOMContentLoaded", function() {
  canvas = document.getElementById("sceneCanvas");
  ctx = canvas.getContext("2d");
  wrap = document.getElementById("canvas-wrap");

  // Build palette
  buildPalette();

  // Load all images
  for (var cat in ASSET_CATS) {
    ASSET_CATS[cat].forEach(function(a) {
      srcMap[a.key] = a.src;
      var img = new Image();
      img.src = a.src;
      images[a.key] = img;
    });
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // Mouse events on the canvas wrapper (not canvas, since canvas moves)
  wrap.addEventListener("mousedown", onMouseDown);
  wrap.addEventListener("mousemove", onMouseMove);
  wrap.addEventListener("mouseup", onMouseUp);
  wrap.addEventListener("wheel", onWheel, { passive: false });
  wrap.addEventListener("contextmenu", function(e) { e.preventDefault(); });

  // Keyboard
  window.addEventListener("keydown", onKeyDown);

  // Mode tabs
  document.getElementById("mode-paint").addEventListener("click", function() { setMode("paint"); });
  document.getElementById("mode-object").addEventListener("click", function() { setMode("object"); });
  document.getElementById("mode-erase").addEventListener("click", function() { setMode("erase"); });

  // Toolbar
  document.getElementById("tb-grid").addEventListener("click", function() {
    showGrid = !showGrid; this.classList.toggle("active", showGrid); draw();
  });
  document.getElementById("tb-snap").addEventListener("click", function() {
    snapOn = !snapOn; this.classList.toggle("active", snapOn);
  });
  document.getElementById("tb-gridsize").addEventListener("change", function() {
    gridSize = parseInt(this.value) || 64; draw();
  });
  document.getElementById("tb-bgcolor").addEventListener("input", function() {
    bgColor = this.value; draw();
  });
  document.getElementById("tb-fill-row").addEventListener("click", fillRow);
  document.getElementById("tb-fill-area").addEventListener("click", fillArea);
  document.getElementById("tb-undo").addEventListener("click", undo);
  document.getElementById("tb-export").addEventListener("click", exportJSON);
  document.getElementById("tb-import").addEventListener("click", importJSON);
  document.getElementById("tb-clear").addEventListener("click", function() {
    pushUndo(); sceneObjs = []; tileMap = {}; selectedId = null;
    updateProps(); updateObjList(); draw();
  });

  // Property inputs
  ["prop-x","prop-y"].forEach(function(id) {
    document.getElementById(id).addEventListener("input", onPropChange);
  });
  document.getElementById("prop-scale").addEventListener("input", function() {
    document.getElementById("prop-scale-val").textContent = parseFloat(this.value).toFixed(1);
    onPropChange();
  });
  document.getElementById("prop-alpha").addEventListener("input", function() {
    document.getElementById("prop-alpha-val").textContent = parseFloat(this.value).toFixed(2);
    onPropChange();
  });
  document.getElementById("prop-flipx").addEventListener("change", onPropChange);
  document.getElementById("prop-layer").addEventListener("change", onPropChange);
  document.getElementById("prop-dup").addEventListener("click", duplicateSelected);
  document.getElementById("prop-del").addEventListener("click", deleteSelected);

  // Load saved scene
  loadFromStorage();

  // Autosave every 3s
  setInterval(saveToStorage, 3000);

  setTimeout(draw, 400);
});

// =====================================================
//  PALETTE
// =====================================================
function buildPalette() {
  var container = document.getElementById("pal-sections");
  for (var cat in ASSET_CATS) {
    var sec = document.createElement("div");
    sec.className = "pal-section";
    var h3 = document.createElement("h3");
    h3.textContent = cat + " ▾";
    sec.appendChild(h3);
    var grid = document.createElement("div");
    grid.className = "pal-grid";

    h3.addEventListener("click", (function(g, h) {
      return function() {
        g.classList.toggle("collapsed");
        h.textContent = h.textContent.replace(/ [▾▸]/, "") + (g.classList.contains("collapsed") ? " ▸" : " ▾");
      };
    })(grid, h3));

    ASSET_CATS[cat].forEach(function(asset) {
      var item = document.createElement("div");
      item.className = "pal-item";
      item.setAttribute("data-key", asset.key);
      var img = document.createElement("img");
      img.src = asset.src;
      var name = document.createElement("div");
      name.className = "name";
      name.textContent = asset.key;
      item.appendChild(img);
      item.appendChild(name);
      grid.appendChild(item);

      // Click to select this as the active brush/object
      item.addEventListener("click", function() {
        // Deselect previous
        var prev = document.querySelector(".pal-item.selected");
        if (prev) prev.classList.remove("selected");
        item.classList.add("selected");
        selectedAsset = { key: asset.key, src: asset.src, tile: !!asset.tile };
      });
    });

    sec.appendChild(grid);
    container.appendChild(sec);
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll(".mode-tab").forEach(function(t) { t.classList.remove("active"); });
  document.getElementById("mode-" + m).classList.add("active");
  canvas.style.cursor = m === "erase" ? "not-allowed" : "crosshair";
}

// =====================================================
//  CANVAS SIZING
// =====================================================
function resizeCanvas() {
  var r = wrap.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
  canvas.style.width = r.width + "px";
  canvas.style.height = r.height + "px";
  draw();
}

// =====================================================
//  CAMERA: screen ↔ world transforms
// =====================================================
function screenToWorld(sx, sy) {
  return {
    x: (sx - canvas.width / 2) / cam.zoom + cam.x,
    y: (sy - canvas.height / 2) / cam.zoom + cam.y
  };
}
function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + canvas.width / 2,
    y: (wy - cam.y) * cam.zoom + canvas.height / 2
  };
}

// --- ISOMETRIC GRID ---
// Tiles are isometric diamonds inside a square image.
// tileW = full image width (gridSize), tileH = half of that for iso spacing.
// Even rows start at x=0, odd rows are offset by half a tile width.
// Rows are spaced tileH apart (half the image height).

// Convert isometric grid col,row → world pixel position (top-left of the tile image)
function isoToWorld(col, row) {
  var tileW = gridSize;
  var tileH = gridSize / 2; // vertical spacing between rows
  var offsetX = (row % 2 !== 0) ? tileW / 2 : 0; // odd rows shifted right
  return {
    x: col * tileW + offsetX,
    y: row * tileH
  };
}

// Convert world pixel position → nearest isometric grid col,row
function worldToIso(wx, wy) {
  var tileW = gridSize;
  var tileH = gridSize / 2;
  // Rough row from Y
  var row = Math.round(wy / tileH);
  // Adjust X for row offset
  var offsetX = (row % 2 !== 0) ? tileW / 2 : 0;
  var col = Math.round((wx - offsetX) / tileW);
  return { col: col, row: row };
}

// Snap a world coord to the nearest iso grid position
function snapWorld(wx, wy) {
  var g = worldToIso(wx, wy);
  return isoToWorld(g.col, g.row);
}

// Grid col/row from world coords (for tile painting)
function worldToGrid(wx, wy) {
  return worldToIso(wx, wy);
}

// =====================================================
//  DRAW
// =====================================================
function draw() {
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  // Apply camera transform
  ctx.translate(W / 2, H / 2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  // Background fill (large area)
  ctx.fillStyle = bgColor;
  var viewTL = screenToWorld(0, 0);
  var viewBR = screenToWorld(W, H);
  ctx.fillRect(viewTL.x - 100, viewTL.y - 100, viewBR.x - viewTL.x + 200, viewBR.y - viewTL.y + 200);

  // Grid — draw isometric diamond guides
  if (showGrid) {
    ctx.strokeStyle = "rgba(255,255,255,0.07)";
    ctx.lineWidth = 1 / cam.zoom;
    var tileW = gridSize;
    var tileH = gridSize / 2; // iso row spacing
    var halfW = tileW / 2;
    var halfH = tileH / 2;

    // Figure out which rows/cols are visible
    var startRow = Math.floor(viewTL.y / tileH) - 2;
    var endRow = Math.ceil(viewBR.y / tileH) + 2;
    var startCol = Math.floor(viewTL.x / tileW) - 2;
    var endCol = Math.ceil(viewBR.x / tileW) + 2;

    // Draw diamond outlines for each iso cell
    for (var r = startRow; r <= endRow; r++) {
      for (var c = startCol; c <= endCol; c++) {
        var pos = isoToWorld(c, r);
        // Diamond center
        var cx = pos.x + halfW;
        var cy = pos.y + halfH;
        ctx.beginPath();
        ctx.moveTo(cx, cy - halfH);       // top
        ctx.lineTo(cx + halfW, cy);       // right
        ctx.lineTo(cx, cy + halfH);       // bottom
        ctx.lineTo(cx - halfW, cy);       // left
        ctx.closePath();
        ctx.stroke();
      }
    }

    // Origin crosshair
    ctx.strokeStyle = "rgba(255,100,100,0.25)";
    ctx.lineWidth = 2 / cam.zoom;
    ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(20, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 20); ctx.stroke();
  }

  // --- PAINTED TILES (isometric positions) ---
  for (var key in tileMap) {
    var t = tileMap[key];
    var parts = key.split(",");
    var col = parseInt(parts[0]);
    var row = parseInt(parts[1]);
    // Convert iso grid position to world pixel coords
    var pos = isoToWorld(col, row);
    var img = images[t.key];
    if (img && img.complete && img.naturalWidth) {
      ctx.drawImage(img, pos.x, pos.y, gridSize, gridSize);
    }
  }

  // --- SCENE OBJECTS (sorted by layer then Y) ---
  var sorted = sceneObjs.slice().sort(function(a, b) {
    if (a.layer !== b.layer) return a.layer - b.layer;
    return a.y - b.y;
  });
  sorted.forEach(function(obj) {
    var img = images[obj.key];
    if (!img || !img.complete || !img.naturalWidth) return;
    var w = img.naturalWidth * obj.scale;
    var h = img.naturalHeight * obj.scale;

    ctx.save();
    ctx.globalAlpha = obj.alpha;
    if (obj.flipX) {
      ctx.translate(obj.x + w, obj.y);
      ctx.scale(-1, 1);
      ctx.drawImage(img, 0, 0, w, h);
    } else {
      ctx.drawImage(img, obj.x, obj.y, w, h);
    }
    ctx.restore();

    // Selection box
    if (obj.id === selectedId) {
      ctx.strokeStyle = "#ffd700";
      ctx.lineWidth = 2 / cam.zoom;
      ctx.setLineDash([4 / cam.zoom, 3 / cam.zoom]);
      ctx.strokeRect(obj.x - 1, obj.y - 1, w + 2, h + 2);
      ctx.setLineDash([]);
    }
  });

  // --- GHOST PREVIEW (when painting, show tile under cursor) ---
  if (ghostPos && selectedAsset && (mode === "paint" || mode === "erase")) {
    ctx.globalAlpha = mode === "erase" ? 0.3 : 0.5;
    if (mode === "erase") {
      ctx.fillStyle = "rgba(255,0,0,0.3)";
      ctx.fillRect(ghostPos.x, ghostPos.y, gridSize, gridSize);
    } else {
      var gImg = images[selectedAsset.key];
      if (gImg && gImg.complete) {
        ctx.drawImage(gImg, ghostPos.x, ghostPos.y, gridSize, gridSize);
      }
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Status text
  document.getElementById("status").textContent =
    "Zoom: " + (cam.zoom * 100).toFixed(0) + "% | " +
    "Tiles: " + Object.keys(tileMap).length + " | Objs: " + sceneObjs.length +
    " | Pan: mid-click | Zoom: scroll | Mode: " + mode.toUpperCase();
}

var ghostPos = null; // snapped world position for ghost tile preview

// =====================================================
//  MOUSE EVENTS
// =====================================================
function getWorldPos(e) {
  var r = wrap.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;
  return screenToWorld(sx, sy);
}

function onMouseDown(e) {
  var r = wrap.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;

  // Middle mouse or right mouse = pan
  if (e.button === 1 || e.button === 2) {
    panning = true;
    panStart = { x: sx, y: sy, cx: cam.x, cy: cam.y };
    canvas.style.cursor = "grab";
    e.preventDefault();
    return;
  }

  // Left click
  var world = screenToWorld(sx, sy);

  if (mode === "paint") {
    if (!selectedAsset) return;
    painting = true;
    pushUndo();
    paintTileAt(world.x, world.y);
    draw();
  } else if (mode === "erase") {
    painting = true;
    pushUndo();
    eraseTileAt(world.x, world.y);
    draw();
  } else if (mode === "object") {
    // Hit test scene objects
    var hit = hitTestObj(world.x, world.y);
    if (hit) {
      selectedId = hit.id;
      dragging = { id: hit.id, ox: world.x - hit.x, oy: world.y - hit.y };
      canvas.style.cursor = "grabbing";
    } else if (selectedAsset) {
      // Place new object
      pushUndo();
      var nx = snapOn ? snapWorld(world.x, world.y).x : Math.round(world.x);
      var ny = snapOn ? snapWorld(world.x, world.y).y : Math.round(world.y);
      var obj = {
        id: nextId++, key: selectedAsset.key, src: selectedAsset.src,
        x: nx, y: ny, scale: 2, alpha: 1, flipX: false, layer: 1
      };
      sceneObjs.push(obj);
      selectedId = obj.id;
    } else {
      selectedId = null;
    }
    updateProps(); updateObjList(); draw();
  }
}

function onMouseMove(e) {
  var r = wrap.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;

  // Panning
  if (panning) {
    var dx = (sx - panStart.x) / cam.zoom;
    var dy = (sy - panStart.y) / cam.zoom;
    cam.x = panStart.cx - dx;
    cam.y = panStart.cy - dy;
    draw();
    return;
  }

  var world = screenToWorld(sx, sy);

  // Ghost preview
  if (mode === "paint" || mode === "erase") {
    var snapped = snapWorld(world.x, world.y);
    ghostPos = { x: snapped.x, y: snapped.y };
  } else {
    ghostPos = null;
  }

  // Paint/erase while dragging
  if (painting && mode === "paint") {
    paintTileAt(world.x, world.y);
  } else if (painting && mode === "erase") {
    eraseTileAt(world.x, world.y);
  }

  // Drag object
  if (dragging) {
    var obj = sceneObjs.find(function(o) { return o.id === dragging.id; });
    if (obj) {
      if (snapOn) {
        var s = snapWorld(world.x - dragging.ox, world.y - dragging.oy);
        obj.x = s.x; obj.y = s.y;
      } else {
        obj.x = Math.round(world.x - dragging.ox);
        obj.y = Math.round(world.y - dragging.oy);
      }
      updateProps();
    }
  }

  draw();
}

function onMouseUp(e) {
  panning = false;
  painting = false;
  if (dragging) { dragging = null; }
  canvas.style.cursor = mode === "erase" ? "not-allowed" : "crosshair";
}

function onWheel(e) {
  e.preventDefault();
  var factor = e.deltaY < 0 ? 1.12 : 0.89;
  cam.zoom = Math.max(0.15, Math.min(5, cam.zoom * factor));
  draw();
}

// =====================================================
//  TILE PAINTING
// =====================================================
function paintTileAt(wx, wy) {
  if (!selectedAsset) return;
  var g = worldToGrid(wx, wy);
  var key = g.col + "," + g.row;
  tileMap[key] = { key: selectedAsset.key };
}

function eraseTileAt(wx, wy) {
  var g = worldToGrid(wx, wy);
  var key = g.col + "," + g.row;
  delete tileMap[key];
}

// Fill an entire row with the selected tile
function fillRow() {
  if (!selectedAsset) { alert("Select a tile first"); return; }
  var cols = parseInt(prompt("How many columns wide?", "20"));
  if (!cols || cols < 1) return;
  var startRow = parseInt(prompt("Which row? (0 = origin)", "0"));
  if (isNaN(startRow)) return;
  var startCol = parseInt(prompt("Starting column? (0 = origin)", "0"));
  if (isNaN(startCol)) return;

  pushUndo();
  for (var c = startCol; c < startCol + cols; c++) {
    tileMap[c + "," + startRow] = { key: selectedAsset.key };
  }
  draw();
}

// Fill a rectangular area with the selected tile
function fillArea() {
  if (!selectedAsset) { alert("Select a tile first"); return; }
  var cols = parseInt(prompt("Width in tiles?", "12"));
  if (!cols || cols < 1) return;
  var rows = parseInt(prompt("Height in tiles?", "8"));
  if (!rows || rows < 1) return;
  var startCol = parseInt(prompt("Start column?", "0"));
  if (isNaN(startCol)) return;
  var startRow = parseInt(prompt("Start row?", "0"));
  if (isNaN(startRow)) return;

  pushUndo();
  for (var r = startRow; r < startRow + rows; r++) {
    for (var c = startCol; c < startCol + cols; c++) {
      tileMap[c + "," + r] = { key: selectedAsset.key };
    }
  }
  draw();
}

// =====================================================
//  OBJECT HIT TEST
// =====================================================
function hitTestObj(wx, wy) {
  var sorted = sceneObjs.slice().sort(function(a, b) {
    if (b.layer !== a.layer) return b.layer - a.layer;
    return b.y - a.y;
  });
  for (var i = 0; i < sorted.length; i++) {
    var obj = sorted[i];
    var img = images[obj.key];
    if (!img || !img.naturalWidth) continue;
    var w = img.naturalWidth * obj.scale;
    var h = img.naturalHeight * obj.scale;
    if (wx >= obj.x && wx <= obj.x + w && wy >= obj.y && wy <= obj.y + h) return obj;
  }
  return null;
}

// =====================================================
//  KEYBOARD
// =====================================================
function onKeyDown(e) {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;

  // Ctrl+Z = undo
  if (e.key === "z" && e.ctrlKey) { undo(); e.preventDefault(); return; }

  if (!selectedId) return;
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) return;
  var step = e.shiftKey ? gridSize : 1;

  switch (e.key) {
    case "ArrowLeft": obj.x -= step; e.preventDefault(); break;
    case "ArrowRight": obj.x += step; e.preventDefault(); break;
    case "ArrowUp": obj.y -= step; e.preventDefault(); break;
    case "ArrowDown": obj.y += step; e.preventDefault(); break;
    case "Delete": case "Backspace": deleteSelected(); e.preventDefault(); return;
    case "d": if (e.ctrlKey) { duplicateSelected(); e.preventDefault(); } return;
    default: return;
  }
  updateProps(); draw();
}

// =====================================================
//  UNDO
// =====================================================
function pushUndo() {
  // Save snapshot of current state
  undoStack.push({
    tileMap: JSON.parse(JSON.stringify(tileMap)),
    sceneObjs: JSON.parse(JSON.stringify(sceneObjs))
  });
  if (undoStack.length > 30) undoStack.shift(); // cap at 30
}

function undo() {
  if (undoStack.length === 0) return;
  var snap = undoStack.pop();
  tileMap = snap.tileMap;
  sceneObjs = snap.sceneObjs;
  // Restore nextId
  var maxId = 0;
  sceneObjs.forEach(function(o) { if (o.id > maxId) maxId = o.id; });
  nextId = maxId + 1;
  selectedId = null;
  updateProps(); updateObjList(); draw();
}

// =====================================================
//  PROPERTIES
// =====================================================
function updateProps() {
  var none = document.getElementById("prop-none");
  var fields = document.getElementById("prop-fields");
  if (!selectedId) { none.style.display = "block"; fields.style.display = "none"; return; }
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) { none.style.display = "block"; fields.style.display = "none"; return; }
  none.style.display = "none"; fields.style.display = "block";
  document.getElementById("prop-x").value = obj.x;
  document.getElementById("prop-y").value = obj.y;
  document.getElementById("prop-scale").value = obj.scale;
  document.getElementById("prop-scale-val").textContent = obj.scale.toFixed(1);
  document.getElementById("prop-alpha").value = obj.alpha;
  document.getElementById("prop-alpha-val").textContent = obj.alpha.toFixed(2);
  document.getElementById("prop-flipx").checked = obj.flipX;
  document.getElementById("prop-layer").value = obj.layer;
}

function onPropChange() {
  if (!selectedId) return;
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) return;
  obj.x = parseInt(document.getElementById("prop-x").value) || 0;
  obj.y = parseInt(document.getElementById("prop-y").value) || 0;
  obj.scale = parseFloat(document.getElementById("prop-scale").value) || 1;
  obj.alpha = parseFloat(document.getElementById("prop-alpha").value) || 1;
  obj.flipX = document.getElementById("prop-flipx").checked;
  obj.layer = parseInt(document.getElementById("prop-layer").value);
  draw();
}

function duplicateSelected() {
  if (!selectedId) return;
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) return;
  pushUndo();
  var dup = JSON.parse(JSON.stringify(obj));
  dup.id = nextId++; dup.x += gridSize; dup.y += gridSize;
  sceneObjs.push(dup); selectedId = dup.id;
  updateProps(); updateObjList(); draw();
}

function deleteSelected() {
  if (!selectedId) return;
  pushUndo();
  sceneObjs = sceneObjs.filter(function(o) { return o.id !== selectedId; });
  selectedId = null; updateProps(); updateObjList(); draw();
}

// =====================================================
//  OBJECT LIST
// =====================================================
function updateObjList() {
  var list = document.getElementById("obj-list");
  document.getElementById("obj-count").textContent = sceneObjs.length;
  list.innerHTML = "";
  var sorted = sceneObjs.slice().sort(function(a, b) { return a.layer - b.layer; });
  sorted.forEach(function(obj) {
    var item = document.createElement("div");
    item.className = "layer-item" + (obj.id === selectedId ? " selected" : "");
    var ln = ["BK","MD","FR"];
    var info = document.createElement("span");
    info.textContent = "[" + ln[obj.layer] + "] " + obj.key;
    var del = document.createElement("span");
    del.className = "del-btn"; del.textContent = "x";
    del.addEventListener("click", function(ev) {
      ev.stopPropagation(); pushUndo();
      sceneObjs = sceneObjs.filter(function(o) { return o.id !== obj.id; });
      if (selectedId === obj.id) selectedId = null;
      updateProps(); updateObjList(); draw();
    });
    item.appendChild(info); item.appendChild(del);
    item.addEventListener("click", function() {
      selectedId = obj.id; updateProps(); updateObjList(); draw();
    });
    list.appendChild(item);
  });
}

// =====================================================
//  EXPORT / IMPORT
// =====================================================
function exportJSON() {
  var data = {
    gridSize: gridSize, bgColor: bgColor,
    tiles: tileMap,
    objects: sceneObjs.map(function(o) {
      return { key: o.key, x: o.x, y: o.y, scale: o.scale, alpha: o.alpha, flipX: o.flipX, layer: o.layer };
    })
  };
  var json = JSON.stringify(data, null, 2);
  document.getElementById("export-json").value = json;
  navigator.clipboard.writeText(json).catch(function() {});
}

function importJSON() {
  var json = prompt("Paste scene JSON:");
  if (!json) return;
  try {
    var data = JSON.parse(json);
    pushUndo();
    if (data.gridSize) { gridSize = data.gridSize; document.getElementById("tb-gridsize").value = gridSize; }
    if (data.bgColor) { bgColor = data.bgColor; document.getElementById("tb-bgcolor").value = bgColor; }
    tileMap = data.tiles || {};
    sceneObjs = [];
    if (data.objects) {
      data.objects.forEach(function(o) {
        sceneObjs.push({
          id: nextId++, key: o.key, src: srcMap[o.key] || "",
          x: o.x, y: o.y, scale: o.scale || 1, alpha: o.alpha !== undefined ? o.alpha : 1,
          flipX: o.flipX || false, layer: o.layer || 1
        });
      });
    }
    selectedId = null; updateProps(); updateObjList(); draw();
  } catch(ex) { alert("Invalid JSON: " + ex.message); }
}

// =====================================================
//  LOCAL STORAGE
// =====================================================
function saveToStorage() {
  try {
    localStorage.setItem("is3_scene_v2", JSON.stringify({
      gridSize: gridSize, bgColor: bgColor, cam: cam,
      tiles: tileMap,
      objects: sceneObjs.map(function(o) {
        return { key: o.key, x: o.x, y: o.y, scale: o.scale, alpha: o.alpha, flipX: o.flipX, layer: o.layer };
      })
    }));
  } catch(ex) {}
}

function loadFromStorage() {
  try {
    var saved = localStorage.getItem("is3_scene_v2");
    if (!saved) return;
    var data = JSON.parse(saved);
    if (data.gridSize) { gridSize = data.gridSize; document.getElementById("tb-gridsize").value = gridSize; }
    if (data.bgColor) { bgColor = data.bgColor; document.getElementById("tb-bgcolor").value = bgColor; }
    if (data.cam) cam = data.cam;
    tileMap = data.tiles || {};
    if (data.objects) {
      data.objects.forEach(function(o) {
        sceneObjs.push({
          id: nextId++, key: o.key, src: srcMap[o.key] || "",
          x: o.x, y: o.y, scale: o.scale || 1, alpha: o.alpha !== undefined ? o.alpha : 1,
          flipX: o.flipX || false, layer: o.layer || 1
        });
      });
    }
    updateObjList();
  } catch(ex) {}
}

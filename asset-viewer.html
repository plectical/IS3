<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IS3 Dungeon Scene Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      color: #ddd;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* --- LEFT PANEL: asset palette --- */
    #palette {
      width: 220px;
      min-width: 220px;
      background: #111118;
      border-right: 1px solid #333;
      overflow-y: auto;
      padding: 8px;
    }
    #palette h2 {
      font-size: 13px;
      color: #ffd700;
      margin: 0 0 6px;
    }
    .pal-section { margin-bottom: 12px; }
    .pal-section h3 {
      font-size: 10px;
      color: #88aaff;
      margin-bottom: 4px;
      border-bottom: 1px solid #222;
      padding-bottom: 2px;
      cursor: pointer;
    }
    .pal-section h3:hover { color: #aaccff; }
    .pal-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .pal-grid.collapsed { display: none; }
    .pal-item {
      background: #1a1a28;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 3px;
      cursor: grab;
      text-align: center;
      transition: border-color 0.15s;
    }
    .pal-item:hover { border-color: #ffd700; }
    .pal-item img {
      image-rendering: pixelated;
      display: block;
      max-width: 48px;
      max-height: 48px;
      margin: 0 auto;
    }
    .pal-item .name {
      font-size: 7px;
      color: #777;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 52px;
    }

    /* --- CENTER: scene canvas --- */
    #scene-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #151520;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    #toolbar button {
      background: #252535;
      color: #ddd;
      border: 1px solid #444;
      padding: 4px 10px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      border-radius: 3px;
      cursor: pointer;
    }
    #toolbar button:hover { background: #353548; border-color: #666; }
    #toolbar button.active { background: #445; border-color: #88f; color: #fff; }
    #toolbar label { font-size: 10px; color: #aaa; }
    #toolbar select, #toolbar input[type="number"] {
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      padding: 2px 6px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      border-radius: 3px;
    }
    #toolbar input[type="number"] { width: 50px; }
    .sep { width: 1px; height: 20px; background: #333; }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #080810;
    }
    #sceneCanvas {
      position: absolute;
      top: 0; left: 0;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* --- RIGHT PANEL: selected object properties --- */
    #props {
      width: 200px;
      min-width: 200px;
      background: #111118;
      border-left: 1px solid #333;
      padding: 8px;
      overflow-y: auto;
    }
    #props h2 {
      font-size: 13px;
      color: #ffd700;
      margin-bottom: 8px;
    }
    #props .prop-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    #props .prop-row label { font-size: 10px; color: #aaa; }
    #props .prop-row input {
      background: #222;
      color: #ddd;
      border: 1px solid #444;
      padding: 2px 4px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      border-radius: 3px;
      width: 70px;
    }
    #props .prop-row input[type="range"] { width: 90px; }
    #prop-none { font-size: 10px; color: #666; }
    #layer-list { margin-top: 12px; }
    #layer-list h3 { font-size: 11px; color: #8f8; margin-bottom: 4px; }
    .layer-item {
      font-size: 9px;
      padding: 3px 6px;
      background: #1a1a28;
      border: 1px solid #333;
      margin-bottom: 2px;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .layer-item.selected { border-color: #ffd700; background: #252530; }
    .layer-item .del-btn {
      color: #f44;
      cursor: pointer;
      font-size: 10px;
      padding: 0 4px;
    }
    .layer-item .del-btn:hover { color: #f88; }

    /* Export area */
    #export-area {
      margin-top: 12px;
      border-top: 1px solid #333;
      padding-top: 8px;
    }
    #export-area textarea {
      width: 100%;
      height: 80px;
      background: #1a1a28;
      color: #8f8;
      border: 1px solid #333;
      font-family: 'Courier New', monospace;
      font-size: 8px;
      padding: 4px;
      border-radius: 3px;
      resize: vertical;
    }
  </style>
</head>
<body>

<!-- LEFT: Asset palette -->
<div id="palette">
  <h2>Assets</h2>
  <div id="pal-sections"></div>
</div>

<!-- CENTER: Scene canvas -->
<div id="scene-area">
  <div id="toolbar">
    <label>Scene:
      <input type="number" id="tb-width" value="800" min="200" max="2000" step="50">
      x
      <input type="number" id="tb-height" value="500" min="200" max="1200" step="50">
    </label>
    <div class="sep"></div>
    <label>BG:
      <input type="color" id="tb-bgcolor" value="#0d1f0d">
    </label>
    <div class="sep"></div>
    <button id="tb-grid" class="active">Grid</button>
    <button id="tb-snap">Snap</button>
    <div class="sep"></div>
    <button id="tb-export">Export JSON</button>
    <button id="tb-import">Import JSON</button>
    <button id="tb-clear">Clear All</button>
    <div class="sep"></div>
    <label style="font-size:9px;color:#666;">Drag assets from palette. Click to select. Arrow keys to nudge.</label>
  </div>
  <div id="canvas-wrap">
    <canvas id="sceneCanvas"></canvas>
  </div>
</div>

<!-- RIGHT: Properties -->
<div id="props">
  <h2>Properties</h2>
  <div id="prop-panel">
    <div id="prop-none">Click an object to edit its properties</div>
    <div id="prop-fields" style="display:none;">
      <div class="prop-row"><label>X:</label><input type="number" id="prop-x" step="1"></div>
      <div class="prop-row"><label>Y:</label><input type="number" id="prop-y" step="1"></div>
      <div class="prop-row"><label>Scale:</label><input type="range" id="prop-scale" min="0.2" max="5" step="0.1" value="1"><span id="prop-scale-val" style="font-size:9px;color:#ffd700;width:30px;">1.0</span></div>
      <div class="prop-row"><label>Opacity:</label><input type="range" id="prop-alpha" min="0.1" max="1" step="0.05" value="1"><span id="prop-alpha-val" style="font-size:9px;color:#ffd700;width:30px;">1.0</span></div>
      <div class="prop-row"><label>Flip X:</label><input type="checkbox" id="prop-flipx"></div>
      <div class="prop-row"><label>Layer:</label>
        <select id="prop-layer">
          <option value="0">Back</option>
          <option value="1">Mid</option>
          <option value="2">Front</option>
        </select>
      </div>
      <div class="prop-row"><button id="prop-dup" style="width:100%;">Duplicate</button></div>
      <div class="prop-row"><button id="prop-del" style="width:100%;color:#f44;">Delete</button></div>
    </div>
  </div>

  <div id="layer-list">
    <h3>Scene Objects</h3>
    <div id="obj-list"></div>
  </div>

  <div id="export-area">
    <textarea id="export-json" readonly placeholder="Export JSON will appear here..."></textarea>
  </div>
</div>

// =====================================================
//  STATE
// =====================================================
var images = {};         // loaded Image objects keyed by asset key
var srcMap = {};         // key → src path

// Scene objects: each is { id, key, src, x, y, scale, alpha, flipX, layer }
var sceneObjs = [];
var nextId = 1;
var selectedId = null;   // currently selected object ID
var dragging = null;     // { id, offsetX, offsetY } when dragging an object
var dragNew = null;      // { key, src } when dragging from palette

// Settings
var showGrid = true;
var snapToGrid = false;
var gridSize = 32;
var bgColor = "#0d1f0d";

// Canvas stuff
var canvas, ctx, wrap;
var sceneW = 800, sceneH = 500;

// =====================================================
//  INIT
// =====================================================
window.addEventListener("DOMContentLoaded", function() {
  canvas = document.getElementById("sceneCanvas");
  ctx = canvas.getContext("2d");
  wrap = document.getElementById("canvas-wrap");

  // Build palette
  buildPalette();

  // Preload all images
  for (var cat in ASSET_CATS) {
    ASSET_CATS[cat].forEach(function(a) {
      srcMap[a.key] = a.src;
      var img = new Image();
      img.src = a.src;
      images[a.key] = img;
    });
  }

  // Size canvas
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // Canvas mouse events
  canvas.addEventListener("mousedown", onMouseDown);
  canvas.addEventListener("mousemove", onMouseMove);
  canvas.addEventListener("mouseup", onMouseUp);
  canvas.addEventListener("dblclick", onDblClick);

  // Drop from palette
  canvas.addEventListener("dragover", function(e) { e.preventDefault(); });
  canvas.addEventListener("drop", onDrop);

  // Keyboard
  window.addEventListener("keydown", onKeyDown);

  // Toolbar
  document.getElementById("tb-grid").addEventListener("click", function() {
    showGrid = !showGrid;
    this.classList.toggle("active", showGrid);
    draw();
  });
  document.getElementById("tb-snap").addEventListener("click", function() {
    snapToGrid = !snapToGrid;
    this.classList.toggle("active", snapToGrid);
  });
  document.getElementById("tb-bgcolor").addEventListener("input", function() {
    bgColor = this.value;
    draw();
  });
  document.getElementById("tb-width").addEventListener("change", function() {
    sceneW = parseInt(this.value) || 800;
    resizeCanvas(); draw();
  });
  document.getElementById("tb-height").addEventListener("change", function() {
    sceneH = parseInt(this.value) || 500;
    resizeCanvas(); draw();
  });
  document.getElementById("tb-export").addEventListener("click", exportJSON);
  document.getElementById("tb-import").addEventListener("click", importJSON);
  document.getElementById("tb-clear").addEventListener("click", function() {
    sceneObjs = []; selectedId = null; updateProps(); updateObjList(); draw();
  });

  // Property inputs
  ["prop-x","prop-y"].forEach(function(id) {
    document.getElementById(id).addEventListener("input", onPropChange);
  });
  document.getElementById("prop-scale").addEventListener("input", function() {
    document.getElementById("prop-scale-val").textContent = parseFloat(this.value).toFixed(1);
    onPropChange();
  });
  document.getElementById("prop-alpha").addEventListener("input", function() {
    document.getElementById("prop-alpha-val").textContent = parseFloat(this.value).toFixed(2);
    onPropChange();
  });
  document.getElementById("prop-flipx").addEventListener("change", onPropChange);
  document.getElementById("prop-layer").addEventListener("change", onPropChange);
  document.getElementById("prop-dup").addEventListener("click", duplicateSelected);
  document.getElementById("prop-del").addEventListener("click", deleteSelected);

  // Initial draw
  setTimeout(draw, 300);
});

// =====================================================
//  PALETTE
// =====================================================
function buildPalette() {
  var container = document.getElementById("pal-sections");
  for (var cat in ASSET_CATS) {
    var sec = document.createElement("div");
    sec.className = "pal-section";

    var h3 = document.createElement("h3");
    h3.textContent = cat + " ▾";
    sec.appendChild(h3);

    var grid = document.createElement("div");
    grid.className = "pal-grid";

    // Toggle collapse on header click
    h3.addEventListener("click", (function(g, h) {
      return function() {
        g.classList.toggle("collapsed");
        h.textContent = h.textContent.replace(/ [▾▸]/, "") + (g.classList.contains("collapsed") ? " ▸" : " ▾");
      };
    })(grid, h3));

    ASSET_CATS[cat].forEach(function(asset) {
      var item = document.createElement("div");
      item.className = "pal-item";
      item.draggable = true;
      item.setAttribute("data-key", asset.key);
      item.setAttribute("data-src", asset.src);

      var img = document.createElement("img");
      img.src = asset.src;

      var name = document.createElement("div");
      name.className = "name";
      name.textContent = asset.key;

      item.appendChild(img);
      item.appendChild(name);
      grid.appendChild(item);

      // Drag start from palette
      item.addEventListener("dragstart", function(e) {
        dragNew = { key: asset.key, src: asset.src };
        e.dataTransfer.setData("text/plain", asset.key);
      });
    });

    sec.appendChild(grid);
    container.appendChild(sec);
  }
}

// =====================================================
//  CANVAS
// =====================================================
function resizeCanvas() {
  canvas.width = sceneW;
  canvas.height = sceneH;
  canvas.style.width = sceneW + "px";
  canvas.style.height = sceneH + "px";
}

function draw() {
  ctx.clearRect(0, 0, sceneW, sceneH);

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, sceneW, sceneH);

  // Grid
  if (showGrid) {
    ctx.strokeStyle = "rgba(255,255,255,0.06)";
    ctx.lineWidth = 1;
    for (var x = 0; x < sceneW; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, sceneH); ctx.stroke();
    }
    for (var y = 0; y < sceneH; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(sceneW, y); ctx.stroke();
    }
  }

  // Sort by layer then by Y for draw order
  var sorted = sceneObjs.slice().sort(function(a, b) {
    if (a.layer !== b.layer) return a.layer - b.layer;
    return a.y - b.y;
  });

  // Draw objects
  sorted.forEach(function(obj) {
    var img = images[obj.key];
    if (!img || !img.complete || !img.naturalWidth) return;

    var w = img.naturalWidth * obj.scale;
    var h = img.naturalHeight * obj.scale;

    ctx.save();
    ctx.globalAlpha = obj.alpha;

    if (obj.flipX) {
      ctx.translate(obj.x + w, obj.y);
      ctx.scale(-1, 1);
      ctx.drawImage(img, 0, 0, w, h);
    } else {
      ctx.drawImage(img, obj.x, obj.y, w, h);
    }

    ctx.restore();

    // Selection highlight
    if (obj.id === selectedId) {
      ctx.strokeStyle = "#ffd700";
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(obj.x - 1, obj.y - 1, w + 2, h + 2);
      ctx.setLineDash([]);
    }
  });
}

// =====================================================
//  MOUSE EVENTS
// =====================================================
function canvasPos(e) {
  var r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function hitTest(mx, my) {
  // Test from front to back (highest layer first, then highest Y)
  var sorted = sceneObjs.slice().sort(function(a, b) {
    if (b.layer !== a.layer) return b.layer - a.layer;
    return b.y - a.y;
  });
  for (var i = 0; i < sorted.length; i++) {
    var obj = sorted[i];
    var img = images[obj.key];
    if (!img || !img.naturalWidth) continue;
    var w = img.naturalWidth * obj.scale;
    var h = img.naturalHeight * obj.scale;
    if (mx >= obj.x && mx <= obj.x + w && my >= obj.y && my <= obj.y + h) {
      return obj;
    }
  }
  return null;
}

function onMouseDown(e) {
  var pos = canvasPos(e);
  var hit = hitTest(pos.x, pos.y);

  if (hit) {
    selectedId = hit.id;
    dragging = { id: hit.id, offsetX: pos.x - hit.x, offsetY: pos.y - hit.y };
    canvas.style.cursor = "grabbing";
  } else {
    selectedId = null;
  }
  updateProps();
  updateObjList();
  draw();
}

function onMouseMove(e) {
  if (!dragging) return;
  var pos = canvasPos(e);
  var obj = sceneObjs.find(function(o) { return o.id === dragging.id; });
  if (!obj) return;

  var nx = pos.x - dragging.offsetX;
  var ny = pos.y - dragging.offsetY;

  if (snapToGrid) {
    nx = Math.round(nx / gridSize) * gridSize;
    ny = Math.round(ny / gridSize) * gridSize;
  }

  obj.x = Math.round(nx);
  obj.y = Math.round(ny);
  updateProps();
  draw();
}

function onMouseUp(e) {
  if (dragging) {
    dragging = null;
    canvas.style.cursor = "crosshair";
  }
}

function onDblClick(e) {
  // Double-click brings object to front
  if (!selectedId) return;
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (obj) {
    obj.layer = 2;
    updateProps(); updateObjList(); draw();
  }
}

function onDrop(e) {
  e.preventDefault();
  if (!dragNew) return;

  var pos = canvasPos(e);
  var nx = pos.x;
  var ny = pos.y;

  if (snapToGrid) {
    nx = Math.round(nx / gridSize) * gridSize;
    ny = Math.round(ny / gridSize) * gridSize;
  }

  // Create new scene object at the drop position
  var obj = {
    id: nextId++,
    key: dragNew.key,
    src: dragNew.src,
    x: Math.round(nx),
    y: Math.round(ny),
    scale: 1.5,
    alpha: 1,
    flipX: false,
    layer: 1
  };

  sceneObjs.push(obj);
  selectedId = obj.id;
  dragNew = null;

  updateProps();
  updateObjList();
  draw();
}

// =====================================================
//  KEYBOARD
// =====================================================
function onKeyDown(e) {
  if (!selectedId) return;
  // Don't capture if typing in an input
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;

  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) return;

  var step = e.shiftKey ? 10 : 1;

  switch (e.key) {
    case "ArrowLeft":  obj.x -= step; e.preventDefault(); break;
    case "ArrowRight": obj.x += step; e.preventDefault(); break;
    case "ArrowUp":    obj.y -= step; e.preventDefault(); break;
    case "ArrowDown":  obj.y += step; e.preventDefault(); break;
    case "Delete":
    case "Backspace":  deleteSelected(); e.preventDefault(); return;
    case "d":
      if (e.ctrlKey) { duplicateSelected(); e.preventDefault(); }
      return;
    default: return;
  }

  updateProps();
  draw();
}

// =====================================================
//  PROPERTIES PANEL
// =====================================================
function updateProps() {
  var none = document.getElementById("prop-none");
  var fields = document.getElementById("prop-fields");

  if (!selectedId) {
    none.style.display = "block";
    fields.style.display = "none";
    return;
  }

  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) {
    none.style.display = "block";
    fields.style.display = "none";
    return;
  }

  none.style.display = "none";
  fields.style.display = "block";

  document.getElementById("prop-x").value = obj.x;
  document.getElementById("prop-y").value = obj.y;
  document.getElementById("prop-scale").value = obj.scale;
  document.getElementById("prop-scale-val").textContent = obj.scale.toFixed(1);
  document.getElementById("prop-alpha").value = obj.alpha;
  document.getElementById("prop-alpha-val").textContent = obj.alpha.toFixed(2);
  document.getElementById("prop-flipx").checked = obj.flipX;
  document.getElementById("prop-layer").value = obj.layer;
}

function onPropChange() {
  if (!selectedId) return;
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) return;

  obj.x = parseInt(document.getElementById("prop-x").value) || 0;
  obj.y = parseInt(document.getElementById("prop-y").value) || 0;
  obj.scale = parseFloat(document.getElementById("prop-scale").value) || 1;
  obj.alpha = parseFloat(document.getElementById("prop-alpha").value) || 1;
  obj.flipX = document.getElementById("prop-flipx").checked;
  obj.layer = parseInt(document.getElementById("prop-layer").value);

  draw();
}

function duplicateSelected() {
  if (!selectedId) return;
  var obj = sceneObjs.find(function(o) { return o.id === selectedId; });
  if (!obj) return;

  var dup = Object.assign({}, obj);
  dup.id = nextId++;
  dup.x += 20;
  dup.y += 20;
  sceneObjs.push(dup);
  selectedId = dup.id;
  updateProps(); updateObjList(); draw();
}

function deleteSelected() {
  if (!selectedId) return;
  sceneObjs = sceneObjs.filter(function(o) { return o.id !== selectedId; });
  selectedId = null;
  updateProps(); updateObjList(); draw();
}

// =====================================================
//  OBJECT LIST
// =====================================================
function updateObjList() {
  var list = document.getElementById("obj-list");
  list.innerHTML = "";

  // Sort by layer for the list
  var sorted = sceneObjs.slice().sort(function(a, b) { return a.layer - b.layer; });

  sorted.forEach(function(obj) {
    var item = document.createElement("div");
    item.className = "layer-item" + (obj.id === selectedId ? " selected" : "");

    var layerNames = ["BK", "MD", "FR"];
    var info = document.createElement("span");
    info.textContent = "[" + layerNames[obj.layer] + "] " + obj.key + " (" + obj.x + "," + obj.y + ")";

    var del = document.createElement("span");
    del.className = "del-btn";
    del.textContent = "x";
    del.addEventListener("click", function(e) {
      e.stopPropagation();
      sceneObjs = sceneObjs.filter(function(o) { return o.id !== obj.id; });
      if (selectedId === obj.id) selectedId = null;
      updateProps(); updateObjList(); draw();
    });

    item.appendChild(info);
    item.appendChild(del);

    item.addEventListener("click", function() {
      selectedId = obj.id;
      updateProps(); updateObjList(); draw();
    });

    list.appendChild(item);
  });
}

// =====================================================
//  EXPORT / IMPORT
// =====================================================
function exportJSON() {
  var data = {
    sceneW: sceneW,
    sceneH: sceneH,
    bgColor: bgColor,
    objects: sceneObjs.map(function(o) {
      return { key: o.key, x: o.x, y: o.y, scale: o.scale, alpha: o.alpha, flipX: o.flipX, layer: o.layer };
    })
  };
  var json = JSON.stringify(data, null, 2);
  document.getElementById("export-json").value = json;

  // Also copy to clipboard
  navigator.clipboard.writeText(json).catch(function() {});
}

function importJSON() {
  var json = prompt("Paste scene JSON:");
  if (!json) return;
  try {
    var data = JSON.parse(json);
    if (data.sceneW) { sceneW = data.sceneW; document.getElementById("tb-width").value = sceneW; }
    if (data.sceneH) { sceneH = data.sceneH; document.getElementById("tb-height").value = sceneH; }
    if (data.bgColor) { bgColor = data.bgColor; document.getElementById("tb-bgcolor").value = bgColor; }
    resizeCanvas();

    sceneObjs = [];
    if (data.objects) {
      data.objects.forEach(function(o) {
        sceneObjs.push({
          id: nextId++,
          key: o.key,
          src: srcMap[o.key] || "",
          x: o.x, y: o.y,
          scale: o.scale || 1,
          alpha: o.alpha !== undefined ? o.alpha : 1,
          flipX: o.flipX || false,
          layer: o.layer || 1
        });
      });
    }
    selectedId = null;
    updateProps(); updateObjList(); draw();
  } catch(e) {
    alert("Invalid JSON: " + e.message);
  }
}

// Auto-save to localStorage
setInterval(function() {
  try {
    var data = {
      sceneW: sceneW, sceneH: sceneH, bgColor: bgColor,
      objects: sceneObjs.map(function(o) {
        return { key: o.key, x: o.x, y: o.y, scale: o.scale, alpha: o.alpha, flipX: o.flipX, layer: o.layer };
      })
    };
    localStorage.setItem("is3_scene_editor", JSON.stringify(data));
  } catch(e) {}
}, 3000);

// Load from localStorage on boot
window.addEventListener("DOMContentLoaded", function() {
  try {
    var saved = localStorage.getItem("is3_scene_editor");
    if (saved) {
      var data = JSON.parse(saved);
      if (data.sceneW) { sceneW = data.sceneW; document.getElementById("tb-width").value = sceneW; }
      if (data.sceneH) { sceneH = data.sceneH; document.getElementById("tb-height").value = sceneH; }
      if (data.bgColor) { bgColor = data.bgColor; document.getElementById("tb-bgcolor").value = bgColor; }
      resizeCanvas();
      if (data.objects) {
        data.objects.forEach(function(o) {
          sceneObjs.push({
            id: nextId++, key: o.key, src: srcMap[o.key] || "",
            x: o.x, y: o.y, scale: o.scale || 1,
            alpha: o.alpha !== undefined ? o.alpha : 1,
            flipX: o.flipX || false, layer: o.layer || 1
          });
        });
      }
      updateObjList();
      setTimeout(draw, 500);
    }
  } catch(e) {}
});
</script>
